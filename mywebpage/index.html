<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyApp</title>
    <style>
      body {
        justify-content: center;
        align-items: center;
        display: flex;
        flex-direction: column;
        margin-top: 200px;
      }
      .container {
        display: flex;
        width: 900px;
        border-radius: 24px;
        overflow: hidden;
        position: relative;
      }
      .btn {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: none;
        outline: none;
        background-color: rgb(27, 130, 239);
        color: white;
        box-shadow: 0 4px 14px 0;
        border-radius: 4px;
        width: 100px;
        height: 30px;
        font-size: 16px;
      }
      .form-div {
        flex: 1;
        padding: 3rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .banner {
        flex: 1;
        padding: 3rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        background-color: rgb(0, 170, 255);
        color: rgb(255, 255, 255);
        position: relative;
      }
    </style>
  </head>
  <body>
    <div>
            <img src="https://www.gsma.com/solutions-and-impact/technologies/networks/wp-content/uploads/2025/06/Capgemini-logo.webp" alt=""
        width="250" height="100">
        </div>
    <div class="container">
        
      <div class="banner">
        <h2>Capgemini AutoTest Pro</h2>
        <p>Learn Automation</p>
      </div>
      <div class="form-div">
        <form action="dashboard.html" method="" post>
          <label for="username">Username</label>
          <input type="text" id="username" />
          <br /><br />
          <label for="password">Password</label>
          <input type="password" id="password" />
          <br /><br />
          <input type="submit" value="Login" class="btn" />
        </form>
      </div>
    </div>
  </body>
</html>
