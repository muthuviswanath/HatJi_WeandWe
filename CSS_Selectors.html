<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .message{
            font-family: Arial, Helvetica, sans-serif;
            color: crimson;
        }
        div ul{
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            color:chocolate;
        }
        div ~ p{
            color:red;
        }

        p:last-child{
            color:green
        }
    </style>
</head>
<body>
    <div>
        <ul>
            <li>Java</li>
            <li>Python</li>
            <li>Dart</li>
        </ul>
        <p>Paragraph 1 inside First Div</p>
        <p>Paragraph 2 inside First Div</p>
        <p>Paragraph 3 inside First Div</p>
    </div>
    <p>Paragraph 3</p>
    <p>Paragraph 4</p>
</body>
</html>
